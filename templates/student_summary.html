<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Summary - Quiz Master</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: Arial, sans-serif;
    color: #fff;
}
.card-box {
    background: #fff;
    color: #000;
    padding: 35px;
    border-radius: 16px;
    max-width: 500px;
    margin: auto;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>📊 My Quiz Summary</h3>
        <a href="{{ url_for('student_dashboard') }}" class="btn btn-light">⬅ Back</a>
    </div>

    <!-- ✅ Data passed safely via attributes -->
    <div class="card-box text-center"
         id="summaryData"
         data-attempted="{{ attempted or 0 }}"
         data-notattempted="{{ not_attempted or 0 }}">

        <h5 class="mb-3">Welcome, {{ username }}</h5>

        <canvas id="summaryChart" height="300"></canvas>

        <div class="mt-4">
            <p><strong>Attempted:</strong> {{ attempted or 0 }}</p>
            <p><strong>Not Attempted:</strong> {{ not_attempted or 0 }}</p>
        </div>
    </div>

</div>

<script>
    const box = document.getElementById("summaryData");

    const attempted = parseInt(box.dataset.attempted) || 0;
    const notAttempted = parseInt(box.dataset.notattempted) || 0;

    const ctx = document.getElementById('summaryChart').getContext('2d');

    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['Attempted', 'Not Attempted'],
            datasets: [{
                data: [attempted, notAttempted],
                backgroundColor: ['#28a745', '#dc3545']
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'bottom'
                }
            }
        }
    });
</script>

</body>
</html>
