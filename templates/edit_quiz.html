<!DOCTYPE html>
<html>
<head>
    <title>Edit Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h3>✏️ Edit Quiz</h3>

    <form method="post">
        <div class="mb-3">
            <label>Subject</label>
            <input type="text" name="subject" class="form-control" value="{{ quiz.subject }}" required>
        </div>

        <div class="mb-3">
            <label>Chapter</label>
            <input type="text" name="chapter" class="form-control" value="{{ quiz.chapter }}" required>
        </div>

        <button type="submit" class="btn btn-primary">Update</button>
        <a href="{{ url_for('profile') }}" class="btn btn-secondary">Back</a>
    </form>
</div>

</body>
</html>
