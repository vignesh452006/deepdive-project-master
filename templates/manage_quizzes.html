<!DOCTYPE html>
<html>
<head>
<title>Manage Quizzes</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
<h2>📚 Manage Quizzes</h2>

{% for quiz in quizzes %}
<div class="card my-3 shadow">
<div class="card-body">

<h4>📝 {{ quiz.title }} ({{ quiz.subject }} - {{ quiz.chapter }})</h4>
<hr>

<!-- Existing Questions -->
{% for q in quiz.questions %}
<form method="post" action="{{ url_for('update_question', question_id=q.id) }}" class="mb-3 border p-3 rounded">
    <input type="text" name="question" value="{{ q.text }}" class="form-control mb-2" required>

    {% for opt in q.options %}
    <div class="input-group mb-1">
        <input type="text" name="opt{{ loop.index0 }}" value="{{ opt.text }}" class="form-control" required>
        <span class="input-group-text">
            <input type="radio" name="correct" value="{{ loop.index0 }}"
                   {% if opt.is_correct %}checked{% endif %}>
            Correct
        </span>
    </div>
    {% endfor %}

    <button class="btn btn-sm btn-success mt-2">Update</button>
</form>

<form method="post" action="{{ url_for('delete_question', question_id=q.id) }}">
    <button class="btn btn-sm btn-danger mb-3"
            onclick="return confirm('Delete this question?')">Delete</button>
</form>
{% endfor %}

<!-- Add New Question -->
<form method="post" action="{{ url_for('add_question', quiz_id=quiz.id) }}" class="border p-3 rounded bg-light">
<h6>➕ Add New Question</h6>

<input type="text" name="question" class="form-control mb-2" placeholder="Enter question" required>

{% for i in range(4) %}
<div class="input-group mb-1">
    <input type="text" name="opt{{ i }}" class="form-control" placeholder="Option {{ i+1 }}" required>
    <span class="input-group-text">
        <input type="radio" name="correct" value="{{ i }}" required>
        Correct
    </span>
</div>
{% endfor %}

<button class="btn btn-primary mt-2">Add Question</button>
</form>

</div>
</div>
{% endfor %}

<a href="{{ url_for('staff_dashboard') }}" class="btn btn-secondary">⬅ Back</a>
</div>

</body>
</html>
