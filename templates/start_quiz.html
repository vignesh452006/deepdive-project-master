<!DOCTYPE html>
<html>
<head>
<title>Start Quiz</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script>


function startTimer() {
    const timer = setInterval(() => {
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        document.getElementById("timer").innerText =
            m + ":" + (s < 10 ? "0" + s : s);

        timeLeft--;
        if (timeLeft < 0) {
            clearInterval(timer);
            alert("Time up! Submitting quiz.");
            document.getElementById("quizForm").submit();
        }
    }, 1000);
}
window.onload = startTimer;
</script>
</head>

<body class="bg-light">
<div class="container py-4">

<h4>{{ quiz.subject }} - {{ quiz.chapter }}</h4>
<p>⏱ Time duration:9:59:00 <span id="timer" class="text-danger fw-bold"></span></p>

<form method="post" id="quizForm">
{% for q in questions %}
<div class="card mb-3 p-3">
    <p><strong>{{ loop.index }}. {{ q.text }}</strong></p>
    {% for opt in q.options %}
        <div>
            <input type="radio" name="{{ q.id }}" value="{{ opt.id }}" required>
            {{ opt.text }}
        </div>
    {% endfor %}
</div>
{% endfor %}

<button class="btn btn-success">Submit Quiz</button>
</form>

</div>
</body>
</html>
