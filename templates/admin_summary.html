<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Summary</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">📊 Admin Summary</h2>

    <!-- Summary Cards -->
    <div class="row text-center">
        <div class="col-md-4">
            <div class="card p-3 shadow">
                <h5>Total Students</h5>
                <h2>{{ total_students }}</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 shadow">
                <h5>Total Staff</h5>
                <h2>{{ total_staff }}</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 shadow">
                <h5>Total Quizzes</h5>
                <h2>{{ total_quizzes }}</h2>
            </div>
        </div>
    </div>

    <!-- Chart -->
    <div class="card mt-5 p-4 shadow">
        <h5 class="text-center mb-3">Platform Overview</h5>
        <canvas id="summaryChart" height="120"></canvas>
    </div>

    <div class="mt-4 text-center">
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">
            ⬅ Back to Dashboard
        </a>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const students = Number("{{ total_students }}");
    const staff = Number("{{ total_staff }}");
    const quizzes = Number("{{ total_quizzes }}");

    const ctx = document.getElementById("summaryChart").getContext("2d");

    new Chart(ctx, {
        type: "bar",
        data: {
            labels: ["Students", "Staff", "Quizzes"],
            datasets: [{
                label: "Count",
                data: [students, staff, quizzes],
                backgroundColor: [
                    "rgba(78, 115, 223, 0.7)",
                    "rgba(28, 200, 138, 0.7)",
                    "rgba(246, 194, 62, 0.7)"
                ],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { stepSize: 1 }
                }
            }
        }
    });

});
</script>

</body>
</html>
