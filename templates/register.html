<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - Quiz Master</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #e8f0fe;
    font-family: Arial, sans-serif;
}
.box {
    background: #fff;
    padding: 30px;
    width: 340px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    animation: fadeIn 0.6s ease;
}
@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}
.role-btn.active {
    border: 2px solid #000;
}
</style>

<script>
function selectRole(role) {
    document.getElementById("role").value = role;
    document.querySelectorAll(".role-btn").forEach(b => b.classList.remove("active"));
    document.getElementById(role).classList.add("active");
}
</script>

</head>
<body>
<div class="box text-center">
    <h2>Register</h2>

    <!-- Role Selection -->
    <div class="mb-3">
        <p class="mb-1"><strong>Register as:</strong></p>
        <div class="d-flex justify-content-between">
           

            <button type="button" id="staff" class="btn btn-outline-primary role-btn"
                    onclick="selectRole('staff')">Staff</button>
                    
            <button type="button" id="student" class="btn btn-outline-success role-btn"
                    onclick="selectRole('student')">Student</button>
        </div>
    </div>

    <form method="post" action="{{ url_for('register') }}">
        <input type="hidden" name="role" id="role" required>

        <input type="text" name="username" class="form-control my-2" placeholder="Username" required>
        <input type="email" name="email" class="form-control my-2" placeholder="Email" required>
        <input type="password" name="password" class="form-control my-2" placeholder="Password" required>

        <button type="submit" class="btn btn-success w-100 mt-2">Register</button>
    </form>

    <p class="mt-3">
        Already have an account? <a href="{{ url_for('login') }}">Login</a>
    </p>
    <p>
        <a href="{{ url_for('home') }}">← Back to Home</a>
    </p>
</div>
</body>
</html>
