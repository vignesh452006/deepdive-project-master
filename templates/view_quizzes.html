<!DOCTYPE html>
<html>
<head>
<title>View Quizzes</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <h3 class="mb-4">📚 Available Quizzes</h3>

    <form class="d-flex mb-3" method="get">
        <input class="form-control me-2" type="search" name="q"
               value="{{ query }}" placeholder="Search subject / chapter">
        <button class="btn btn-primary">Search</button>
    </form>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Subject</th>
                <th>Chapter</th>
                <th>Date</th>
                <th>Duration</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
        {% for q in quizzes %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ q.subject }}</td>
                <td>{{ q.chapter }}</td>
                <td>{{ q.date }}</td>
                <td>{{ q.duration }} mins</td>
                <td>
                    <a href="{{ url_for('view_quiz', quiz_id=q.id) }}"
                       class="btn btn-sm btn-info">View</a>
                </td>
            </tr>
        {% else %}
            <tr><td colspan="6" class="text-center">No quizzes found</td></tr>
        {% endfor %}
        </tbody>
    </table>

    <a href="{{ url_for('student_dashboard') }}" class="btn btn-secondary">⬅ Back</a>
</div>

</body>
</html>
