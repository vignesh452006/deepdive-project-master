<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile - Quiz Master</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
html, body {
    height: 100%;
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
}
.profile-bg {
    min-height: 100vh;
    background: linear-gradient(135deg, #232526, #414345);
    display: flex;
    justify-content: center;
    align-items: center;
}
.profile-card {
    background: #fff;
    padding: 40px 45px;
    border-radius: 18px;
    width: 95%;
    max-width: 900px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    position: relative;
}
.logo {
    position: absolute;
    top: 15px;
    right: 20px;
    font-weight: bold;
    font-size: 18px;
    color: #198754;
}
.section-box {
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
}
.section-title {
    font-weight: 600;
    margin-bottom: 15px;
}
</style>
</head>
<body>

<div class="profile-bg">
    <div class="profile-card">

        <!-- ✅ Logo Top Right -->
        <div class="logo">🧠 Quiz Master</div>

        <h3 class="mb-4 text-center">👤 Profile</h3>

        <!-- ✅ User Info (DO NOT CHANGE) -->
        <div class="section-box">
            <p><strong>Username:</strong> {{ user.username }}</p>
            <p><strong>Email:</strong> {{ user.email }}</p>
            <p><strong>Role:</strong> {{ role }}</p>
        </div>

        <!-- ✅ Edit Profile -->
        <div class="section-box">
            <div class="section-title">✏️ Edit Profile</div>
            <form method="post" action="{{ url_for('edit_profile') }}">
                <div class="row g-2">
                    <div class="col-md-6">
                        <input type="text" name="username" class="form-control"
                               placeholder="New Username" required>
                    </div>
                    <div class="col-md-6">
                        <input type="email" name="email" class="form-control"
                               placeholder="New Email" required>
                    </div>
                </div>
                <button class="btn btn-primary mt-3">Update Profile</button>
            </form>
        </div>

       

      
       
        <!-- ✅ Back -->
        <div class="text-center">
            <a href="{{ url_for('staff_dashboard') }}" class="btn btn-secondary">
                ⬅ Back to Dashboard
            </a>
        </div>

    </div>
</div>

</body>
</html>
