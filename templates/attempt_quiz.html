<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attempt Quiz</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.timer-box {
    background: #0d6efd;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 18px;
    font-weight: bold;
    display: inline-block;
}
</style>
</head>
<body class="bg-light">

<div class="container mt-5">
<div class="card p-4 shadow">

<h3 class="mb-3 text-center">📝 Attempt Quiz</h3>

{% if quizzes %}
<form method="get">
    <label class="form-label">Select Quiz</label>
    <select name="quiz_id" class="form-select mb-3" required>
        <option value="">-- Choose a quiz --</option>
        {% for q in quizzes %}
        <option value="{{ q.id }}">{{ q.subject }} - {{ q.chapter }}</option>
        {% endfor %}
    </select>
    <button type="submit" class="btn btn-primary">Load Quiz</button>
</form>
{% endif %}

{% if quiz %}
<hr>

<div class="d-flex justify-content-between align-items-center mb-3">
    <h5>{{ quiz.subject }} - {{ quiz.chapter }}</h5>
    <!-- ⏱️ Timer -->
    <div class="timer-box">
        Time Left: <span id="time">--:--</span>
    </div>
</div>

<form method="post" id="quizForm">
    <input type="hidden" name="quiz_id" value="{{ quiz.id }}">

    {% for q in quiz.questions %}
    <div class="mb-3">
        <p><strong>{{ loop.index }}. {{ q.text }}</strong></p>
        {% for opt in q.options %}
        <div class="form-check">
            <input class="form-check-input" type="radio"
                   name="q{{ q.id }}" value="{{ opt.id }}" required>
            <label class="form-check-label">{{ opt.text }}</label>
        </div>
        {% endfor %}
    </div>
    {% endfor %}

    <button type="submit" class="btn btn-success">Submit Quiz</button>
</form>

<!-- ⏱️ Pass duration (minutes) -->
<input type="hidden" id="duration" value="{{ quiz.duration }}">

{% endif %}

<a href="{{ url_for('student_dashboard') }}" class="btn btn-secondary mt-3">⬅ Back</a>

</div>
</div>

{% if quiz %}
<script>
let duration = parseInt(document.getElementById("duration").value) * 60; // seconds
let display = document.getElementById("time");
let form = document.getElementById("quizForm");

function startTimer() {
    let timer = duration;

    const interval = setInterval(function () {
        let minutes = Math.floor(timer / 60);
        let seconds = timer % 60;

        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;

        display.textContent = minutes + ":" + seconds;

        if (--timer < 0) {
            clearInterval(interval);
            alert("⏰ Time is up! Submitting your quiz...");
            form.submit();   // auto submit
        }
    }, 1000);
}

window.onload = startTimer;
</script>
{% endif %}

</body>
</html>
