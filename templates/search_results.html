<!DOCTYPE html>
<html>
<head>
    <title>Search Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h4>🔍 Results for "{{ query }}"</h4>

    {% if quizzes %}
    <table class="table table-bordered table-striped mt-3">
        <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Subject</th>
                <th>Chapter</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
        {% for q in quizzes %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ q.subject }}</td>
                <td>{{ q.chapter }}</td>
                <td>
                    <a href="{{ url_for('attempt_quiz', quiz_id=q.id) }}"
                       class="btn btn-sm btn-primary">
                        Attempt
                    </a>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
    {% else %}
        <p class="text-muted mt-3">No quizzes found.</p>
    {% endif %}

    <a href="{{ url_for('staff_dashboard') }}" class="btn btn-secondary mt-3">⬅ Back</a>
</div>

</body>
</html>
