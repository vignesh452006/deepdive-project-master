<!DOCTYPE html>
<html>
<head>
<title>Manage Students</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h3 class="mb-4">⚙️ Manage Students</h3>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th width="220">Actions</th>
            </tr>
        </thead>
        <tbody>
        {% for s in students %}
        <tr>
            <form method="post" action="{{ url_for('update_student', student_id=s.id) }}">
                <td>{{ s.id }}</td>
                <td>
                    <input type="text" name="username" value="{{ s.username }}" class="form-control" required>
                </td>
                <td>
                    <input type="email" name="email" value="{{ s.email }}" class="form-control" required>
                </td>
                <td>
                    <button class="btn btn-sm btn-primary">Update</button>
                    <a href="{{ url_for('delete_student', student_id=s.id) }}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Delete this student?')">Delete</a>
                </td>
            </form>
        </tr>
        {% endfor %}
        </tbody>
    </table>

    <a href="{{ url_for('staff_dashboard') }}" class="btn btn-secondary">⬅ Back</a>
</div>

</body>
</html>
